<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목소리 설정 (Voice Settings)</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #1a1a24;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --neon-purple: #bd00ff;
            --neon-yellow: #ffea00;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .console-container {
            background-color: var(--panel-color);
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            border-radius: 16px;
            width: 100%;
            max-width: 650px;
            padding: 25px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-align: center;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav-link {
            border: 2px solid #555;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        .intro {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .reset-bar { text-align: center; margin: 15px 0; }

        .voice-card {
            background-color: #0a0a0f;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 12px;
        }

        .voice-name { font-weight: bold; font-size: 15px; word-break: break-all; }

        .voice-lang { color: #888; font-size: 12px; margin: 4px 0 10px; word-break: break-all; }

        .voice-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .voice-btn {
            background-color: #222230;
            border: 1px solid #444;
            color: white;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .voice-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }

        .voice-btn.assigned-male {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
        }

        .voice-btn.assigned-female {
            border-color: var(--neon-purple);
            color: white;
            box-shadow: 0 0 8px var(--neon-purple);
            background: rgba(189, 0, 255, 0.1);
        }

        .empty-msg {
            text-align: center;
            color: var(--neon-yellow);
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="console-container">
        <h1>🎙️ VOICE SETTINGS</h1>

        <div class="nav-bar">
            <a class="nav-link" href="index.html">🤖 타임머신 콘솔</a>
            <a class="nav-link" href="summary.html">📒 요약 노트</a>
        </div>

        <p class="intro">
            이 기기에서 사용할 수 있는 영어 목소리 목록입니다.
            <b>▶ 듣기</b>로 들어 보고, 마음에 드는 목소리를 <b>👨 남자</b> / <b>👩 여자</b> 버튼으로 지정하세요.
            지정한 목소리는 자동 추측보다 항상 우선하며, 이 기기(브라우저)에만 저장됩니다.
            여기에서 설정한 목소리는 MP3 음성이 없을 때만 사용됩니다.
        </p>

        <div class="reset-bar">
            <button class="voice-btn" onclick="resetAssignments()">🔄 지정 초기화 (자동 추측 사용)</button>
        </div>

        <div id="voice-list"></div>
    </div>

    <script>
        const TEST_SENTENCE = 'Hello! I am your English time machine voice.';
        let voiceList = [];

        function getSaved(g) {
            try { return localStorage.getItem('voiceURI:' + g); } catch (e) { return null; }
        }

        function renderVoices() {
            const box = document.getElementById('voice-list');
            if (!('speechSynthesis' in window)) {
                box.innerHTML = '<div class="empty-msg">이 브라우저는 음성 합성(Web Speech API)을 지원하지 않아요.</div>';
                return;
            }
            voiceList = speechSynthesis.getVoices()
                .filter(v => v.lang && v.lang.replace('_', '-').toLowerCase().startsWith('en'));
            if (!voiceList.length) {
                box.innerHTML = '<div class="empty-msg">아직 목소리 목록을 불러오지 못했어요.<br>잠시 기다리거나 화면을 한 번 탭한 뒤 새로고침해 보세요.</div>';
                return;
            }
            const maleUri = getSaved('male');
            const femaleUri = getSaved('female');
            box.innerHTML = '';
            voiceList.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = 'voice-card';

                const name = document.createElement('div');
                name.className = 'voice-name';
                name.innerText = v.name || '(이름 없음)';
                card.appendChild(name);

                const lang = document.createElement('div');
                lang.className = 'voice-lang';
                lang.innerText = v.lang + (v.voiceURI && v.voiceURI !== v.name ? ' · ' + v.voiceURI : '');
                card.appendChild(lang);

                const actions = document.createElement('div');
                actions.className = 'voice-actions';

                const play = document.createElement('button');
                play.className = 'voice-btn';
                play.innerText = '▶ 듣기';
                play.onclick = () => testVoice(i);
                actions.appendChild(play);

                const male = document.createElement('button');
                male.className = 'voice-btn' + (v.voiceURI === maleUri ? ' assigned-male' : '');
                male.innerText = v.voiceURI === maleUri ? '👨 남자 목소리 ✔' : '👨 남자로 지정';
                male.onclick = () => assign(i, 'male');
                actions.appendChild(male);

                const female = document.createElement('button');
                female.className = 'voice-btn' + (v.voiceURI === femaleUri ? ' assigned-female' : '');
                female.innerText = v.voiceURI === femaleUri ? '👩 여자 목소리 ✔' : '👩 여자로 지정';
                female.onclick = () => assign(i, 'female');
                actions.appendChild(female);

                card.appendChild(actions);
                box.appendChild(card);
            });
        }

        function testVoice(i) {
            const v = voiceList[i];
            if (!v) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(TEST_SENTENCE);
            u.voice = v;
            u.lang = v.lang;
            u.rate = 0.9;
            speechSynthesis.speak(u);
        }

        function assign(i, gender) {
            const v = voiceList[i];
            if (!v) return;
            try {
                // 같은 목소리를 다시 누르면 지정 해제
                if (getSaved(gender) === v.voiceURI) localStorage.removeItem('voiceURI:' + gender);
                else localStorage.setItem('voiceURI:' + gender, v.voiceURI);
            } catch (e) {}
            renderVoices();
        }

        function resetAssignments() {
            try {
                localStorage.removeItem('voiceURI:male');
                localStorage.removeItem('voiceURI:female');
            } catch (e) {}
            renderVoices();
        }

        if ('speechSynthesis' in window) {
            speechSynthesis.addEventListener('voiceschanged', renderVoices);
        }
        renderVoices();
    </script>

</body>
</html>
